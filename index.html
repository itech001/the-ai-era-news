<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>最新 24 小时 AI 热点新闻与动态 - TheAIEra</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #DC2626;
        --bg-light: #FEF2F2;
        --bg-white: #FFFFFF;
        --text-dark: #1F2937;
        --text-muted: #6B7280;
        --border: #E5E7EB;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg-light);
        color: var(--text-dark);
        line-height: 1.5;
      }

      /* Header */
      .header {
        background: var(--bg-white);
        border-bottom: 1px solid var(--border);
        padding: 0.75rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .header-title {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--text-dark);
        letter-spacing: -0.025em;
      }

      .header-tag {
        font-size: 0.6875rem;
        font-weight: 600;
        color: var(--primary);
        background: var(--bg-light);
        padding: 0.125rem 0.5rem;
        border-radius: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .header-stats {
        display: flex;
        gap: 1rem;
        font-size: 0.8125rem;
        color: var(--text-muted);
      }

      .header-stats b {
        color: var(--primary);
        font-weight: 600;
      }

      /* Category Tabs */
      .category-tabs {
        background: var(--bg-white);
        border-bottom: 1px solid var(--border);
        padding: 0.5rem 1.5rem;
        display: flex;
        gap: 0.25rem;
        overflow-x: auto;
        flex-wrap: wrap;
      }

      .category-tab {
        padding: 0.375rem 0.875rem;
        border: none;
        border-bottom: 2px solid transparent;
        font-size: 0.8125rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        background: transparent;
        color: var(--text-muted);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .category-tab.active {
        border-bottom-color: var(--primary);
        color: var(--primary);
      }

      .category-tab:hover {
        color: var(--primary);
      }

      /* Main Content */
      .main-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0.75rem 1.5rem;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid var(--border);
      }

      .section-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-dark);
      }

      .result-count {
        font-size: 0.8125rem;
        color: var(--text-muted);
      }

      /* News Grid */
      .news-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .news-card {
        background: var(--bg-white);
        border-radius: 0.375rem;
        padding: 0.625rem;
        border: 1px solid var(--border);
        transition: all 0.15s;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 0.375rem;
      }

      .news-card:hover {
        border-color: var(--primary);
        box-shadow: 0 1px 4px rgba(220, 38, 38, 0.1);
      }

      .card-meta {
        display: flex;
        gap: 0.375rem;
        align-items: center;
        font-size: 0.6875rem;
        flex-wrap: wrap;
      }

      .site-badge {
        font-weight: 500;
        color: var(--primary);
        background: var(--bg-light);
        padding: 0.0625rem 0.375rem;
        border-radius: 0.25rem;
      }

      .source-badge {
        color: var(--text-muted);
      }

      .tag-badge {
        color: #7C3AED;
        background: #F3E8FF;
        padding: 0.0625rem 0.375rem;
        border-radius: 0.25rem;
        font-size: 0.6875rem;
        font-weight: 500;
      }

      .time-badge {
        margin-left: auto;
        color: var(--text-muted);
      }

      .card-title {
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.4;
        color: var(--text-dark);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .news-card:hover .card-title {
        color: var(--primary);
      }

      .card-title-en {
        font-size: 0.75rem;
        color: var(--text-muted);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .empty-state {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--text-muted);
        font-size: 0.875rem;
      }

      /* Footer */
      .footer {
        text-align: center;
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-size: 0.75rem;
      }

      .footer a {
        color: var(--primary);
        text-decoration: none;
      }

      .footer-links {
        margin-bottom: 0.5rem;
      }

      .footer-links span:not(:first-child) {
        margin: 0 0.5rem;
      }

      .footer-meta {
        color: var(--text-muted);
      }

      #deployTime {
        font-weight: 500;
        color: var(--text-dark);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .header {
          padding: 0.5rem 1rem;
        }

        .header-stats {
          display: none;
        }

        .controls {
          padding: 0.5rem 1rem;
        }

        .search-box {
          width: 100%;
          flex: none;
        }

        .main-content {
          padding: 0.5rem 1rem;
        }

        .news-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <h1 class="header-title">TheAIEra - 最新 24 小时 AI 新闻与动态</h1>
        <span class="header-tag">Live</span>
      </div>
      <div class="header-stats">
        <span><b id="totalItems">-</b> 更新</span>
        <span><b id="sourceCount">-</b> 源</span>
        <span>更新: <b id="updateTime">-</b></span>
      </div>
    </header>

    <div class="category-tabs" id="sourceTabs">
      <button class="category-tab active" data-source="all">全部来源</button>
    </div>

    <main class="main-content">
      <div class="section-header">
        <h2 class="section-title" id="sectionTitle">全部</h2>
        <span class="result-count" id="resultCount">加载中...</span>
      </div>
      <div class="news-grid" id="newsList"></div>
    </main>

    <footer class="footer">
      <div class="footer-links">
        <span>部署地址：</span>
        <a href="https://the-ai-era.vercel.app" target="_blank" rel="noopener">Vercel</a>
        <span>|</span>
        <a href="https://www.theaiera.cn" target="_blank" rel="noopener">www.theaiera.cn</a>
        <span>|</span>
        <a href="https://github.com/itech001/the-ai-era" target="_blank" rel="noopener">GitHub</a>
      </div>
      <div class="footer-meta">
        数据每天北京时间 6:30 自动更新 | 上海时间: <span id="deployTime">-</span>
      </div>
    </footer>

    <script>
      let newsData = null;
      let currentSource = 'all';

      const sourceTabs = document.getElementById('sourceTabs');
      const newsList = document.getElementById('newsList');
      const resultCount = document.getElementById('resultCount');
      const sectionTitle = document.getElementById('sectionTitle');
      const totalItems = document.getElementById('totalItems');
      const sourceCount = document.getElementById('sourceCount');
      const updateTime = document.getElementById('updateTime');

      // Get unique sources as categories
      let sourceCategories = [];

      function updateStats() {
        totalItems.textContent = newsData.total_items.toLocaleString();
        sourceCount.textContent = newsData.site_count;

        // Display update time in Shanghai timezone
        const generatedDate = new Date(newsData.generated_at);
        const shanghaiTime = new Date(generatedDate.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
        updateTime.textContent = shanghaiTime.toLocaleString('zh-CN', {
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        });

        // Build source tabs
        buildSourceTabs();
      }

      function buildSourceTabs() {
        // Get unique sources with data
        const sourceMap = new Map();
        (newsData.items || []).forEach(item => {
          if (item.source) {
            const count = sourceMap.get(item.source) || 0;
            sourceMap.set(item.source, count + 1);
          }
        });
        sourceCategories = Array.from(sourceMap.entries())
          .map(([name, count]) => ({ name, count }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 30); // Top 30 sources

        console.log('Sources found:', sourceCategories.length, sourceCategories.slice(0, 5).map(s => s.name));

        // Build source tabs
        sourceTabs.innerHTML = '<button class="category-tab active" data-source="all">全部来源</button>';
        sourceCategories.forEach(source => {
          const btn = document.createElement('button');
          btn.className = 'category-tab';
          btn.dataset.source = source.name;
          btn.textContent = `${source.name} (${source.count})`;
          sourceTabs.appendChild(btn);
        });

        // Add event listeners for source tabs
        sourceTabs.querySelectorAll('.category-tab').forEach(tab => {
          tab.addEventListener('click', handleSourceClick);
        });
      }

      function handleSourceClick(e) {
        // Update source tabs
        sourceTabs.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentSource = e.target.dataset.source;

        sectionTitle.textContent = currentSource === 'all' ? '全部' : currentSource;

        renderNews();
      }

      function formatTime(item) {
        const timestamp = item.published_at || item.first_seen_at;
        if (!timestamp) return '';

        const date = new Date(timestamp);
        const now = new Date();
        const diff = now - date;
        const hours = Math.floor(diff / (1000 * 60 * 60));

        if (hours < 1) {
          const minutes = Math.floor(diff / (1000 * 60));
          return `${minutes}m`;
        } else if (hours < 24) {
          return `${hours}h`;
        } else {
          return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }
      }

      async function loadData() {
        try {
          console.log('Loading data...');
          const response = await fetch('./data/latest-24h.json');

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          newsData = await response.json();
          console.log('Loaded:', newsData.total_items, 'items');

          updateStats();
          renderNews();
        } catch (error) {
          console.error('Failed to load:', error);
          newsList.innerHTML = '<div class="empty-state">加载失败，请确保在服务器环境下运行</div>';
        }
      }

      function filterNews(items) {
        return items.filter(item => {
          // Source filter
          if (currentSource !== 'all' && item.source !== currentSource) return false;

          return true;
        });
      }

      function createNewsCard(item) {
        const card = document.createElement('article');
        card.className = 'news-card';

        const metaHtml = `
          <div class="card-meta">
            <span class="site-badge">${item.site_name}</span>
            ${item.source ? `<span class="source-badge">${item.source}</span>` : ''}
            <time class="time-badge">${formatTime(item)}</time>
          </div>
        `;

        const titleZh = item.title_zh || item.title || '';
        const titleEn = item.title_en || '';

        let titleHtml = `<h3 class="card-title">${titleZh}</h3>`;
        if (titleEn && titleEn !== titleZh) {
          titleHtml += `<p class="card-title-en">${titleEn}</p>`;
        }

        card.innerHTML = metaHtml + titleHtml;

        card.addEventListener('click', () => {
          if (item.url) {
            window.open(item.url, '_blank', 'noopener,noreferrer');
          }
        });

        return card;
      }

      function renderNews() {
        const filtered = filterNews(newsData.items || []);

        resultCount.textContent = `${filtered.length} 条`;

        if (filtered.length === 0) {
          newsList.innerHTML = '<div class="empty-state">暂无数据</div>';
        } else {
          newsList.innerHTML = '';
          filtered.forEach(item => {
            newsList.appendChild(createNewsCard(item));
          });
        }
      }

      // Init
      loadData();
      updateDeployTime();

      // Update deploy time (Shanghai timezone)
      async function updateDeployTime() {
        try {
          // Try to get the last commit time from GitHub API
          const response = await fetch('https://api.github.com/repos/itech001/the-ai-era/commits?per_page=1');
          if (response.ok) {
            const commits = await response.json();
            if (commits && commits.length > 0) {
              const commitDate = new Date(commits[0].commit.committer.date);
              // Convert to Shanghai time (UTC+8)
              const shanghaiTime = new Date(commitDate.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
              const formattedTime = shanghaiTime.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
              });
              document.getElementById('deployTime').textContent = formattedTime;
            }
          }
        } catch (error) {
          console.log('Could not fetch deploy time:', error);
          // Fallback to current time in Shanghai
          const now = new Date();
          const shanghaiTime = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));
          const formattedTime = shanghaiTime.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
          });
          document.getElementById('deployTime').textContent = formattedTime + ' (上海时间)';
        }
      }
    </script>
  </body>
</html>
