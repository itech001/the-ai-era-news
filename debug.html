<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug - AI Signal Board</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 800px;
        margin: 2rem auto;
        padding: 2rem;
        line-height: 1.6;
      }
      .status {
        padding: 1rem;
        border-radius: 0.5rem;
        margin-bottom: 1rem;
      }
      .success { background: #d4edda; color: #155724; }
      .error { background: #f8d7da; color: #721c24; }
      .info { background: #d1ecf1; color: #0c5460; }
      pre {
        background: #f5f5f5;
        padding: 1rem;
        border-radius: 0.375rem;
        overflow-x: auto;
        font-size: 0.875rem;
      }
      button {
        padding: 0.5rem 1rem;
        background: #DC2626;
        color: white;
        border: none;
        border-radius: 0.375rem;
        cursor: pointer;
        font-size: 1rem;
      }
      button:hover {
        background: #B91C1C;
      }
    </style>
  </head>
  <body>
    <h1>🔍 AI Signal Board 调试页面</h1>

    <div id="status"></div>

    <button onclick="testDataLoad()">测试数据加载</button>
    <button onclick="window.location.href='index.html'">返回主页</button>

    <div id="result"></div>

    <script>
      const statusDiv = document.getElementById('status');
      const resultDiv = document.getElementById('result');

      function showStatus(message, type = 'info') {
        statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
      }

      function showResult(html) {
        resultDiv.innerHTML = html;
      }

      async function testDataLoad() {
        showStatus('正在加载数据...', 'info');

        try {
          const response = await fetch('./data/latest-24h.json');

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
          }

          const data = await response.json();

          showStatus('✅ 数据加载成功！', 'success');

          const items = data.items || [];
          const hasAiRelated = items.some(item => item.is_ai_related);

          showResult(`
            <h2>数据信息</h2>
            <pre>
生成时间: ${data.generated_at}
总条目数: ${data.total_items}
AI相关: ${data.total_items_ai_raw}
数据源数: ${data.site_count}
items 数组长度: ${items.length}
包含 is_ai_related 字段: ${hasAiRelated ? '是' : '否'}
            </pre>

            <h3>前 3 条数据:</h3>
            <pre>${JSON.stringify(items.slice(0, 3), null, 2)}</pre>

            <h3>数据字段示例:</h3>
            <pre>${JSON.stringify(items[0] || {}, null, 2)}</pre>
          `);

        } catch (error) {
          showStatus(`❌ 加载失败: ${error.message}`, 'error');
          showResult(`
            <h2>错误详情</h2>
            <pre>${error.stack}</pre>

            <h3>可能的原因:</h3>
            <ul>
              <li>数据文件路径不正确</li>
              <li>CORS 策略阻止了请求</li>
              <li>数据文件过大导致超时</li>
              <li>GitHub Pages 还在部署中</li>
            </ul>

            <h3>解决方案:</h3>
            <ul>
              <li>等待几分钟让 GitHub Pages 完成部署</li>
              <li>清除浏览器缓存并刷新</li>
              <li>检查浏览器控制台的错误信息</li>
            </ul>
          `);
        }
      }

      // 自动测试
      window.onload = () => {
        setTimeout(testDataLoad, 500);
      };
    </script>
  </body>
</html>
